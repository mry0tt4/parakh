# Keeps the free Render instance from sleeping (it idles out after ~15 min).
# Pings the cheap /healthz probe every 10 minutes. GitHub cron can lag a few
# minutes at peak times; if the instance still dozes off once in a while, the
# next ping absorbs the cold start instead of a visitor.
#
# If Render assigns a different subdomain (the name "parakh" may be taken),
# update PING_URL below to match the URL shown in the Render dashboard.
name: keep-warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

env:
  PING_URL: https://parakh-idbi.onrender.com/healthz

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app (twice, 6 min apart)
        run: |
          # two pings per run halve the effective gap, so even when GitHub's
          # cron jitters the schedule the instance never idles past 15 min
          curl -fsS --max-time 90 --retry 2 --retry-delay 5 "$PING_URL" \
            && echo "awake" || echo "ping failed (instance may be redeploying)"
          sleep 360
          curl -fsS --max-time 90 --retry 2 --retry-delay 5 "$PING_URL" \
            && echo "still awake" || echo "second ping failed"
